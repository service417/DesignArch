name: designarc_mobile
description: "DesignArc — the workshop app for carpenters, painters and supervisors."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Kept deliberately small. Every dependency here earns its place:
  http: ^1.2.2                    # REST calls; no need for dio's interceptor stack
  provider: ^6.1.2                # ChangeNotifier wiring, the Flutter-team default
  flutter_secure_storage: ^9.2.2  # tokens belong in the Keystore, not SharedPreferences
  image_picker: ^1.1.2            # camera + gallery for inspection evidence
  intl: ^0.19.0                   # dates in Asia/Colombo, per the architecture decision

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
