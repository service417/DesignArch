# Flutter's template ships -Xmx8G -XX:MaxMetaspaceSize=4G, which asks the JVM for
# 12 GB of limits. On a machine also running an Android emulator, Docker, an IDE
# and a browser, Gradle's memory manager sat in a loop reporting
# "5.2 GB requested, 0 released" and the build made no progress at all — it was
# starved, not slow.
#
# 3 GB heap plus 1 GB metaspace is ample for this app: one module, five plugins,
# no heavy annotation processing. Raise it if a real OutOfMemoryError appears,
# rather than pre-emptively.
org.gradle.jvmargs=-Xmx3G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError

# Reuse the daemon across builds; the first build pays the startup cost once.
org.gradle.daemon=true
# One module, so parallel execution buys nothing and each worker would claim its
# own heap.
org.gradle.parallel=false

android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
